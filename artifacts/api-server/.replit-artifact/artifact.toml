kind = "api"
previewPath = "/"
title = "Main App"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 5000
name = "Main App"
paths = ["/"]

[services.development]
run = "python app.py"

[services.production]

[services.production.build]
args = ["echo", "no-build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["gunicorn", "--bind=0.0.0.0:5000", "--reuse-port", "--workers=2", "--timeout=120", "wsgi:app"]

[services.production.run.env]
PORT = "5000"
NODE_ENV = "production"

[services.production.health.startup]
path = "/"
