<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጊዜያዊ ጥገና — ሰሚራ ልብስ እስቶር</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4ef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 60px 48px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(220,53,69,0.12);
        }
        .icon { font-size: 72px; margin-bottom: 24px; }
        h1 { color: #c0392b; font-size: 28px; margin-bottom: 12px; }
        .subtitle { color: #555; font-size: 15px; margin-bottom: 8px; }
        .en { color: #888; font-size: 13px; margin-bottom: 32px; }
        .whatsapp-btn {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .whatsapp-btn:hover { background: #1ebe5d; }
        .footer { color: #aaa; font-size: 12px; margin-top: 24px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔧</div>
        <h1>ጊዜያዊ ጥገና</h1>
        <p class="subtitle">ሥርዓቱ ለጊዜው ለጥገና ተዘግቷል። ብዙም ሳይቆይ እንመለሳለን!</p>
        <p class="en">We'll be back shortly. Thank you for your patience.</p>
        <a class="whatsapp-btn" href="https://wa.me/251987957957" target="_blank">
            📱 WhatsApp ያናግሩን
        </a>
        <div class="footer">ሰሚራ የሴቶች እና የልጆች ልብስ እስቶር &bull; ወሎ ደሴ ኩታበር</div>
    </div>
</body>
</html>
